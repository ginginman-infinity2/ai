<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>撮影画像の確認</title>
  <style>
    body { background:#111; color:white; text-align:center; padding:40px; font-family:system-ui; }
    img { width:90%; max-width:400px; border:2px solid orange; border-radius:10px; margin-top:20px; }
    .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 999; }
    .login-box { background: #1e1e1e; padding: 30px; border-radius: 12px; text-align: center; width: 280px; color: white; }
    .login-box input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #444; background: #2a2a2a; color: white; box-sizing: border-box; font-size: 1.2rem; text-align: center; }
    .login-box button { width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; margin-top: 10px; }
    .login-error { color: #ef4444; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h3>🔑 合言葉を入力</h3>
      <input type="password" id="secretKey" placeholder="合言葉" />
      <button id="loginBtn">確認</button>
      <p class="login-error" id="loginError"></p>
    </div>
  </div>

  <div id="mainContent" style="display:none;">
    <h1>📸 撮影画像の確認</h1>
    <div id="result">画像を取得中...</div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const supabase = createClient(
      "https://kwbxywugzrlbcalmwvjw.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3Ynh5d3VnenJsYmNhbG13dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NjQ3NjQsImV4cCI6MjA5NTQ0MDc2NH0.bGF_4lcYOLu_TGUEyUbC-c_yC4XISNfGKHZZ8YUVdnY"
    );

    const loginOverlay = document.getElementById("loginOverlay");
    const mainContent = document.getElementById("mainContent");
    const id = new URLSearchParams(window.location.search).get("id");

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const key = document.getElementById("secretKey").value;

      const { data, error } = await supabase
        .from("access_keys")
        .select("secret_key")
        .eq("secret_key", key)
        .single();

      if (error || !data) {
        document.getElementById("loginError").textContent = "合言葉が違います";
      } else {
        loginOverlay.style.display = "none";
        mainContent.style.display = "block";
        loadPhoto();
      }
    });

    async function loadPhoto() {
      const result = document.getElementById("result");
      if (!id) {
        result.textContent = "IDが指定されていません。";
        return;
      }
      const { data } = supabase.storage.from("photos").getPublicUrl(`${id}.jpg`);
      if (data?.publicUrl) {
        result.innerHTML = `<img src="${data.publicUrl}" alt="撮影画像">`;
      } else {
        result.textContent = "画像が見つかりません。";
      }
    }
  </script>
</body>
</html>
