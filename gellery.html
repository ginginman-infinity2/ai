<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ギャラリー</title>
  <style>
    body {
      font-family: "Helvetica", sans-serif;
      background: #111;
      text-align: center;
      padding: 20px;
      color: white;
    }
    h1 { color: #fff; }
    .photo {
      margin: 10px;
      border-radius: 10px;
      width: 220px;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    p { color: #aaa; }
    .logout-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button class="logout-btn" id="logoutBtn">ログアウト</button>
  <h1>📸 ギャラリー</h1>
  <p>撮影された写真一覧</p>
  <div id="photoGrid" class="grid"></div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // 新Supabase（認証用）
    const authSupabase = createClient(
      "https://qxswlqqdmoujxcdzzgdj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4c3dscXFkbW91anhjZHp6Z2RqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NjIxMDEsImV4cCI6MjA5NTUzODEwMX0.3VQtjQ2WACGzXxfiLqHTYY6ojb2t1-kuaOJxfCF2E8s"
    );

    // 本垢Supabase（写真保存用）
    const mainSupabase = createClient(
      "https://kwbxywugzrlbcalmwvjw.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3Ynh5d3VnenJsYmNhbG13dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NjQ3NjQsImV4cCI6MjA5NTQ0MDc2NH0.bGF_4lcYOLu_TGUEyUbC-c_yC4XISNfGKHZZ8YUVdnY"
    );

    // 認証チェック
    const { data: { session } } = await authSupabase.auth.getSession();
    if (!session) {
      window.location.href = "login.html";
      throw new Error("ログインが必要です");
    }

    // ログアウト
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await authSupabase.auth.signOut();
      window.location.href = "login.html";
    });

    // 写真読み込み（認証済みの本垢Supabaseでlist取得）
    const { data: sessionData } = await authSupabase.auth.getSession();
    const token = sessionData.session?.access_token;

    // 本垢Supabaseに認証トークンをセット
    if (token) {
      mainSupabase.auth.setSession({
        access_token: token,
        refresh_token: sessionData.session.refresh_token,
      });
    }

    const { data, error } = await mainSupabase.storage.from("photos").list("", {
      limit: 100,
      sortBy: { column: "created_at", order: "desc" },
    });

    const grid = document.getElementById("photoGrid");

    if (error) {
      grid.innerHTML = `<p>読み込み失敗: ${error.message}</p>`;
    } else if (!data || data.length === 0) {
      grid.innerHTML = "<p>まだ写真がありません</p>";
    } else {
      for (const file of data) {
        const { data: urlData } = await mainSupabase.storage
          .from("photos")
          .createSignedUrl(file.name, 3600);
        if (urlData?.signedUrl) {
          const img = document.createElement("img");
          img.src = urlData.signedUrl;
          img.className = "photo";
          grid.appendChild(img);
        }
      }
    }
  </script>
</body>
</html>
